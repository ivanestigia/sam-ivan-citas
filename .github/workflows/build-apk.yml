name: Build Sam Ivan APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Unzip Android project
        run: unzip -o sam-ivan-citas-android.zip -d android-src

      - name: Find project root
        id: project
        run: |
          ROOT=$(find android-src -name settings.gradle -o -name settings.gradle.kts | head -n 1 | xargs dirname)
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "Project root: $ROOT"

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.root }}
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-ivan-debug-apk
          path: android-src/**/app/build/outputs/apk/debug/*.apk
